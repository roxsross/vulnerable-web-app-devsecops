name: "devsecops tools"
on: 
    push: 
        branches: [master]
env:
  NODE_VERSION: "24"

jobs:
  #####CI SCAN SECRET 
    secret-scan:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write            
        steps:
        - uses: actions/checkout@v6
        - name: Scan secrets con Betterleaks
          run: |
            docker run --rm \
                --user "$(id -u):$(id -g)" \
                -e HOME=/tmp \
                -v "$(pwd):/repo" \
                ghcr.io/betterleaks/betterleaks:latest \
                git /repo \
                --report-format sarif \
                --report-path /repo/betterleaks.sarif \
                --exit-code 0 \
                -v
        - name: Upload Betterleaks SARIF
          uses: github/codeql-action/upload-sarif@v4
          if: always()
          with:
              sarif_file: betterleaks.sarif
              category: betterleaks
  ##### CI TEST 
    test:
        runs-on: ubuntu-latest 
        needs: [secret-scan]         
        steps:
        - uses: actions/checkout@v6
        - name: Setup Node
          uses: actions/setup-node@v6
          with:
            node-version: ${{ env.NODE_VERSION }}
            cache: "npm"

        - name: Install dependencies
          run: npm ci       

        - name: Run test
          run: npm run test    
          continue-on-error: true 

        - name: Run coverage
          run: npm run test:coverage 
          continue-on-error: true   

#####SCAN CI SAST codeql
    sast-codeql:
        runs-on: ubuntu-latest
        needs: [secret-scan, test]
        permissions:
            actions: read
            contents: read
            security-events: write            
        steps:
        - uses: actions/checkout@v6
        - name: Initialize CodeQL
          uses: github/codeql-action/init@v4
          with:
            languages: javascript-typescript
            build-mode: none
        - name: Perform CodeQL Analysis
          uses: github/codeql-action/analyze@v4
          with:
            category: "/language:javascript-typescript"

#####SCAN CI SAST semgrep 
    sast-semgrep:
        runs-on: ubuntu-latest
        needs: [secret-scan, test]
        permissions:
            actions: read
            contents: read
            security-events: write            
        steps:
        - uses: actions/checkout@v6
        - name: Run Semgrep 
          run: |
            docker run --rm \
                -v "$(pwd):/src" \
                semgrep/semgrep:latest \
                semgrep scan \
                --config=p/security-audit \
                --config=p/nodejs \
                --config=p/owasp-top-ten \
                --config=p/javascript \
                --config=p/typescript \
                --config=p/expressjs \
                --sarif \
                --output=/src/semgrep-results.sarif

        - name: Upload Semgrep results to GitHub Security
          uses: github/codeql-action/upload-sarif@v4
          if: always()
          with:
            sarif_file: semgrep-results.sarif
            category: semgrep

#####SCAN CI SCA snyk
    sca-snyk:
      runs-on: ubuntu-latest
      needs: [secret-scan, test]
      permissions:
          contents: read
          security-events: write
          pull-requests: write
      steps:
        - uses: actions/checkout@v6
        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: '22'
        - name: Install dependencies
          run: npm install
        - name: Run Snyk to check for vulnerabilities
          uses: snyk/actions/node@master
          env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          with:
            command: test
            args: >
              --severity-threshold=high
              --sarif-file-output=snyk-results.sarif
          continue-on-error: true
        - name: Upload Snyk SARIF to GitHub Code Scanning
          uses: github/codeql-action/upload-sarif@v4
          if: ${{ always() && hashFiles('snyk-results.sarif') != '' }}
          with:
            sarif_file: snyk-results.sarif
            category: snyk-sca

#####DEPLOY CD Netlify
    DeploytoNetlify:
      runs-on: ubuntu-latest
      needs: [secret-scan, test, sast-codeql, sast-semgrep, sca-snyk ]
      environment:
        name: production
        url: 'https://eclectic-sprinkles-185299.netlify.app'
      steps:
        - uses: actions/checkout@v6
        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
            node-version: ${{ env.NODE_VERSION }}
            cache: "npm"

        - name: Install dependencies
          run: npm ci    

        - name: Deploy to Netlify
          uses: nwtgck/actions-netlify@v3.0
          with:
            publish-dir: './public'
            production-branch: master
            github-token: ${{ secrets.GITHUB_TOKEN }}
            deploy-message: "Deploy from GitHub Actions"
            enable-pull-request-comment: true
            enable-commit-comment: true
            overwrites-pull-request-comment: true
          env:
            NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
            NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}


#####SCAN DAST CD
    Dast:
      runs-on: ubuntu-latest
      needs: [DeploytoNetlify ]
      steps:
        - uses: actions/setup-python@v6
          with:
            python-version: '3.13' 
        - name: Run OWASP ZAP BASELINE
          run: |
            docker run --rm \
              -v "$(pwd):/zap/wrk:rw" \
              -u root \
              ghcr.io/zaproxy/zaproxy:stable \
              zap-baseline.py \
              -t "${{ secrets.NETLIFY_SITE_URL }}" \
              -r zap-report.html \
              -J zap-report.json \
              -x zap-report.xml \
              -I || true
          continue-on-error: true

        - name: Convert ZAP JSON To Sarif
          run: python3 .github/scripts/zap-to-sarif.py
          env:
            ZAP_JSON: zap-report.json
            ZAP_SARIF: zap-results.sarif

        - name: Upload ZAP results to GitHub Security
          uses: github/codeql-action/upload-sarif@v4
          if: always()
          with:
            sarif_file: zap-results.sarif
            category: owasp-zap

        - name: Upload ZAP reports as artifacts
          uses: actions/upload-artifact@v7
          if: always()
          with:
            name: zap-dast-reports
            path: |
              zap-report.html
              zap-report.json
              zap-report.xml
              zap-results.sarif
            retention-days: 30
            if-no-files-found: ignore